services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphahive
      POSTGRES_PASSWORD: alphahive
      POSTGRES_DB: alphahive
    volumes:
      - alphahive_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - alphahive_redis:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - alphahive_ollama:/root/.ollama
    command: serve

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: alphahive-backend:local
    working_dir: /app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://alphahive:alphahive@postgres:5432/alphahive
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_SWARM_MODEL: llama3.2:3b
      OLLAMA_SPECIALIST_MODEL: llama3.1:8b
      LOG_LEVEL: info
      STREAM_ANALYSIS_TIMEOUT_SECONDS: 45
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - ollama

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    stdin_open: true
    tty: true
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  alphahive_postgres:
  alphahive_redis:
  alphahive_ollama:
  frontend_node_modules:
